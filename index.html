<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;font-size:15px}
.wrap{display:flex;height:100vh;gap:0}
.sidebar{width:230px;flex-shrink:0;border-right:1px solid #e0dfd7;overflow-y:auto;padding:12px 8px;background:#fff}
.sidebar-title{font-size:13px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.06em;padding:0 8px 8px}
.phase-label{font-size:11px;font-weight:600;color:#888780;padding:12px 8px 4px;letter-spacing:.05em}
.nav-item{display:block;width:calc(100% - 16px);margin-left:16px;text-align:left;padding:7px 10px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:14px;color:#5f5e5a;line-height:1.3;transition:background .15s}
.nav-item:hover{background:#f1efe8}
.nav-item.active{background:#f1efe8;color:#1a1a18;font-weight:600}
.nav-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle;margin-bottom:1px}
.main{flex:1;overflow-y:auto;padding:24px 28px;background:#f5f5f0}
.main #main-content{max-width:708px;margin:0 auto}
.section-header{margin-bottom:16px}
.section-tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;margin-bottom:8px}
.section-title{font-size:24px;font-weight:600;color:#1a1a18;margin-bottom:6px}
.section-desc{font-size:15px;color:#5f5e5a;line-height:1.65}
.tabs{display:flex;gap:4px;border-bottom:1px solid #e0dfd7;margin-bottom:20px;margin-top:16px}
.tab{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:500;color:#888780;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.tab.active{color:#1a1a18;border-bottom-color:#1a1a18}
.tab-panel{display:none}
.tab-panel.active{display:block}
.card{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #e0dfd7;margin-bottom:16px}
.card-title{font-size:12px;font-weight:600;color:#888780;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.card ul{list-style:none;padding:0}
.card ul li{font-size:14px;color:#5f5e5a;padding:5px 0;border-bottom:1px solid #f1efe8;line-height:1.5}
.card ul li:last-child{border-bottom:none}
.card ul li::before{content:"·";color:#b4b2a9;margin-right:8px}
.partner-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px}
.partner-card{background:#fff;border:1px solid #e0dfd7;border-radius:12px;padding:13px 15px}
.partner-name{font-size:14px;font-weight:600;color:#1a1a18;margin-bottom:4px}
.partner-role{font-size:13px;color:#5f5e5a;line-height:1.45}
.partner-type{display:inline-block;font-size:11px;padding:3px 8px;border-radius:10px;margin-top:6px;font-weight:600}
.strategy-block{background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:12px;border:1px solid #e0dfd7}
.strategy-block h4{font-size:15px;font-weight:600;color:#1a1a18;margin-bottom:8px}
.strategy-block p,.strategy-block li{font-size:14px;color:#5f5e5a;line-height:1.65}
.strategy-block ul{list-style:none;padding:0}
.strategy-block ul li{padding:4px 0}
.strategy-block ul li::before{content:"→ ";color:#b4b2a9}
.ai-item{padding:12px 0;border-bottom:1px solid #f1efe8}
.ai-item:last-child{border-bottom:none}
.ai-item-title{font-size:15px;font-weight:600;color:#1a1a18;margin-bottom:4px}
.ai-item-desc{font-size:14px;color:#5f5e5a;line-height:1.6}
.more-btn{margin-top:10px;padding:8px 18px;border-radius:8px;border:1px solid #d3d1c7;background:none;cursor:pointer;font-size:14px;color:#5f5e5a;transition:background .15s}
.more-btn:hover{background:#f1efe8}
/* Phase color schemes */
.p1{color:#534AB7;background:#EEEDFE}.p1-dot{background:#7F77DD}
.p2{color:#0F6E56;background:#E1F5EE}.p2-dot{background:#1D9E75}
.p3{color:#993C1D;background:#FAECE7}.p3-dot{background:#D85A30}
.p4{color:#185FA5;background:#E6F1FB}.p4-dot{background:#378ADD}
.p5{color:#854F0B;background:#FAEEDA}.p5-dot{background:#BA7517}
.p6{color:#3B6D11;background:#EAF3DE}.p6-dot{background:#639922}
.p7-dot{background:#888780}

.t-strat{color:#3C3489;background:#CECBF6}
.t-api{color:#0C447C;background:#B5D4F4}
.t-saas{color:#085041;background:#9FE1CB}
.t-hw{color:#712B13;background:#F5C4B3}
</style>
</head>

function show(id){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes("'"+id+"'")));
  const d=data[id];
  const pc=d.phaseClass;
  document.getElementById('main-content').innerHTML=`
<div class="section-header">
  <span class="section-tag ${pc}">${d.phase}</span>
  <div class="section-title">${d.title}</div>
  <div class="section-desc">${d.desc}</div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab(this,'items-${id}')">사업 아이템</button>
  <button class="tab" onclick="switchTab(this,'ai-${id}')">AI 기술 접목</button>
  <button class="tab" onclick="switchTab(this,'partners-${id}')">추천 파트너사</button>
  <button class="tab" onclick="switchTab(this,'strategy-${id}')">파트너십 전략</button>
</div>
<div class="tab-panel active" id="items-${id}">
  <div class="card">
    <div class="card-title">핵심 사업 아이템</div>
    <ul>${d.items.map(i=>`<li>${i}</li>`).join('')}</ul>
  </div>
</div>
<div class="tab-panel" id="ai-${id}">
  <div class="card">
    <div class="card-title">AI 기술 접목 포인트</div>
    ${d.ai.map(a=>`<div class="ai-item"><div class="ai-item-title">${a.t}</div><div class="ai-item-desc">${a.d}</div></div>`).join('')}
  </div>
</div>
<div class="tab-panel" id="partners-${id}">
  <div class="partner-grid">
    ${d.partners.map(p=>`<div class="partner-card"><div class="partner-name">${p.n}</div><div class="partner-role">${p.r}</div><span class="partner-type ${p.tc}">${p.t}</span></div>`).join('')}
  </div>
</div>
<div class="tab-panel" id="strategy-${id}">
  <div class="strategy-block"><h4>파트너십 모델</h4><p>${d.strategy.model}</p></div>
  <div class="strategy-block"><h4>접근 전략</h4><p>${d.strategy.approach}</p></div>
  <div class="strategy-block"><h4>주요 협상 포인트</h4><ul>${d.strategy.points.map(p=>`<li>${p}</li>`).join('')}</ul></div>
</div>`;
}

function switchTab(btn,panelId){
  btn.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const main=document.getElementById('main-content');
  main.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  main.querySelector('#'+panelId).classList.add('active');
}

show('planning');
</script>
